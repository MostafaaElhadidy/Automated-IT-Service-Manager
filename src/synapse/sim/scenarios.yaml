# Seeded anomaly schedule (deterministic, SIM_SEED=42)
# t_offset is seconds from monitoring loop start
# 13 scenarios spread ~60 s apart — one new ticket per minute for the demo
scenarios:

  # ── Wave 1: Web tier ─────────────────────────────────────────────────────────
  - name: "WEB-02 worker pool exhaustion"
    t_offset: 30
    ci_id: "WEB-02"
    metric: "error_rate"
    anomaly_value: 0.72
    description: "WEB-02 error rate spikes — worker pool exhausted"

  - name: "WEB-01 high error rate"
    t_offset: 90
    ci_id: "WEB-01"
    metric: "error_rate"
    anomaly_value: 0.55
    description: "WEB-01 error rate elevated — upstream timeout cascade"

  - name: "WEB-03 CRM error spike"
    t_offset: 150
    ci_id: "WEB-03"
    metric: "error_rate"
    anomaly_value: 0.68
    description: "WEB-03 (CRM) error rate spike — possible DB-03 saturation"

  # ── Wave 2: Database tier ─────────────────────────────────────────────────────
  - name: "DB-01 connection pool exhaustion"
    t_offset: 210
    ci_id: "DB-01"
    metric: "db_connections"
    anomaly_value: 98
    description: "DB-01 connection count near limit — billing and sales impacted"

  - name: "DB-02 replica lag connection surge"
    t_offset: 270
    ci_id: "DB-02"
    metric: "db_connections"
    anomaly_value: 89
    description: "DB-02 replica connection surge — HR portal queries queueing"

  - name: "DB-03 CRM DB overload"
    t_offset: 330
    ci_id: "DB-03"
    metric: "db_connections"
    anomaly_value: 93
    description: "DB-03 (MySQL CRM) connections at capacity — CRM app degraded"

  # ── Wave 3: Cache tier ────────────────────────────────────────────────────────
  - name: "REDIS-01 cache stampede"
    t_offset: 390
    ci_id: "REDIS-01"
    metric: "cache_hit_rate"
    anomaly_value: 0.08
    description: "REDIS-01 cache hit rate collapsed — thundering herd on DB-01"

  - name: "REDIS-02 session cache failure"
    t_offset: 450
    ci_id: "REDIS-02"
    metric: "cache_hit_rate"
    anomaly_value: 0.12
    description: "REDIS-02 session cache hit rate critical — user sessions dropping"

  # ── Wave 4: Compute tier ──────────────────────────────────────────────────────
  - name: "AUTH-01 CPU spike"
    t_offset: 510
    ci_id: "AUTH-01"
    metric: "cpu_usage"
    anomaly_value: 0.95
    description: "AUTH-01 CPU at 95% — login failures expected across all apps"

  - name: "APP-01 billing server CPU"
    t_offset: 570
    ci_id: "APP-01"
    metric: "cpu_usage"
    anomaly_value: 0.91
    description: "APP-01 (Billing) CPU overload — invoice processing stalled"

  - name: "APP-02 HR server CPU spike"
    t_offset: 630
    ci_id: "APP-02"
    metric: "cpu_usage"
    anomaly_value: 0.88
    description: "APP-02 (HR) CPU spike — payroll batch job contention"

  # ── Wave 5: Infrastructure ────────────────────────────────────────────────────
  - name: "MQ-01 message queue CPU overload"
    t_offset: 690
    ci_id: "MQ-01"
    metric: "cpu_usage"
    anomaly_value: 0.93
    description: "MQ-01 (RabbitMQ) CPU critical — billing event queue backing up"

  - name: "LB-01 load balancer error surge"
    t_offset: 750
    ci_id: "LB-01"
    metric: "error_rate"
    anomaly_value: 0.45
    description: "LB-01 error rate elevated — downstream web servers unresponsive"
